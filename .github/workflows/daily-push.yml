name: Daily Task Push

on:
  schedule:
    - cron: '0 1 * * *'   # 9:00 Beijing Time
    - cron: '0 13 * * *'  # 21:00 Beijing Time
  workflow_dispatch:
    inputs:
      push_type:
        description: '推送类型'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  push-tasks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run morning push
      if: github.event.schedule == '0 1 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_type == 'morning')
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4/
        OPENAI_MODEL: glm-4-air
        LLM_PROVIDER: openai
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_LANGUAGES: python,javascript
      run: python main.py push morning

    - name: Run evening push
      if: github.event.schedule == '0 13 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_type == 'evening')
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4/
        OPENAI_MODEL: glm-4-air
        LLM_PROVIDER: openai
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: python main.py push evening

    - name: Commit data changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update project data [skip ci]"
        git push
